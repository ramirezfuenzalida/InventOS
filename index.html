<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OSWT App - InventarioWT Management</title>
  <meta name="app-version" content="2.0.FINAL">

  <!-- Diagnostic Global Error Handler (Captura errores antes y durante el arranque) -->
  <script>
    window.addEventListener('error', function(event) {
      var statusText = document.getElementById('status-text');
      if (statusText) {
        statusText.innerHTML = '<span style="color: #f87171; font-weight: bold; font-family: system-ui, sans-serif; display: block; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 15px; text-transform: none; text-align: left; font-size: 13px;">' +
          '⚠️ ERROR DE CARGA:<br>' + 
          '<strong style="color: #ef4444;">' + (event.message || 'Error de script desconocido') + '</strong><br>' +
          '<small style="color: #94a3b8; font-family: monospace; display: block; margin-top: 6px;">Origen: ' + 
          (event.filename ? event.filename.split('/').pop() : 'inline-script') + ':' + (event.lineno || '') + ':' + (event.colno || '') + '</small>' +
          '</span>';
      }
      console.error("Global Catch Error:", event.error || event.message);
    });

    window.addEventListener('unhandledrejection', function(event) {
      var statusText = document.getElementById('status-text');
      if (statusText) {
        var reasonText = 'Rechazo desconocido';
        if (event.reason) {
          reasonText = event.reason.message || event.reason.details || String(event.reason);
        }
        statusText.innerHTML = '<span style="color: #f87171; font-weight: bold; font-family: system-ui, sans-serif; display: block; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 15px; text-transform: none; text-align: left; font-size: 13px;">' +
          '⚠️ ERROR DE PROMESA:<br>' + 
          '<strong style="color: #ef4444;">' + reasonText + '</strong>' +
          '</span>';
      }
      console.error("Global Catch Rejection:", event.reason);
    });
  </script>

  <!-- Favicon SVG Dinámico (Soluciona el error de representación) -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M9 18V5l12-2v13'%3E%3C/path%3E%3Ccircle cx='6' cy='18' r='3'%3E%3C/circle%3E%3Ccircle cx='18' cy='16' r='3'%3E%3C/circle%3E%3C/svg%3E">

  <!-- Iconos para dispositivos móviles e iOS -->
  <link rel="apple-touch-icon" href="/logo_orquesta_sinfonica_wt.png">
  <link rel="icon" type="image/png" href="/logo_orquesta_sinfonica_wt.png">

  <!-- Configuración de PWA y Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020617">

  <!-- Configuración de Web App para modo pantalla completa (iOS) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OSWT App">

  <!-- Configuración para Android/Chrome -->
  <meta name="mobile-web-app-capable" content="yes">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {}
          }
        }
      }
    } else {
      console.warn("Tailwind CDN no se cargó; se usará fallback CSS.");
    }

    // Initialize theme safely (Modo oscuro por defecto en todas las versiones)
    try {
      if (localStorage.theme === 'light') {
        document.documentElement.classList.remove('dark')
      } else {
        document.documentElement.classList.add('dark')
      }
    } catch (e) {
      document.documentElement.classList.add('dark')
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* Impedir que Safari iOS haga auto-zoom al enfocar campos de texto */
    @media (max-width: 768px) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* Soporte de Notch y áreas seguras (safe-area) para dispositivos móviles */
    @media (max-width: 1023px) {
      header {
        padding-top: calc(1rem + env(safe-area-inset-top, 0px)) !important;
      }
      aside {
        padding-top: env(safe-area-inset-top, 0px) !important;
      }
    }

    html {
      overflow-x: hidden;
      max-width: 100%;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      margin: 0;
      overflow-x: hidden;
      max-width: 100%;
      width: 100%;
      position: relative;
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #root {
      max-width: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    .dark body {
      background-color: #020617;
      color: #f1f5f9;
    }

    /* Efectos de Iluminación Ambiental */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .custom-scrollbar::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0f172a;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.5;
        filter: blur(20px);
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
        filter: blur(40px);
      }
    }

    .aura-glow {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes progress {
      0% {
        transform: scaleX(0);
      }

      100% {
        transform: scaleX(1);
      }
    }

    .animate-progress {
      animation: progress 2s ease-in-out forwards;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    .animate-shake {
      animation: shake 0.4s ease-in-out infinite;
    }

    /* Transition for all theme-sensitive properties */
    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Light Mode Overrides (Applied when .dark class is NOT present on html) */
    html:not(.dark) body {
      background-color: #f8fafc;
      color: #1e293b;
    }

    html:not(.dark) .bg-\[\#020617\] {
      background-color: #ffffff !important;
    }

    html:not(.dark) .bg-\[\#020617\]\/95 {
      background-color: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(20px) !important;
    }

    html:not(.dark) .bg-\[\#020617\]\/90 {
      background-color: rgba(255, 255, 255, 0.90) !important;
    }

    html:not(.dark) .bg-slate-950 {
      background-color: #f1f5f9 !important;
    }

    html:not(.dark) .bg-slate-900 {
      background-color: #ffffff !important;
      border-color: #e2e8f0 !important;
    }

    html:not(.dark) .border-slate-800 {
      border-color: #e2e8f0 !important;
    }

    html:not(.dark) .bg-slate-900\/20 {
      background-color: rgba(0, 0, 0, 0.03) !important;
      border-color: #e2e8f0 !important;
    }

    html:not(.dark) .bg-slate-900\/40 {
      background-color: rgba(0, 0, 0, 0.05) !important;
    }

    html:not(.dark) .bg-slate-900\/90 {
      background-color: rgba(255, 255, 255, 0.95) !important;
    }

    html:not(.dark) .border-slate-900 {
      border-color: #e2e8f0 !important;
    }

    html:not(.dark) .border-slate-900\/30 {
      border-color: rgba(0, 0, 0, 0.05) !important;
    }

    html:not(.dark) .border-slate-900\/50 {
      border-color: rgba(0, 0, 0, 0.1) !important;
    }

    html:not(.dark) .border-white\/5 {
      border-color: rgba(0, 0, 0, 0.05) !important;
    }

    html:not(.dark) .border-white\/10 {
      border-color: rgba(0, 0, 0, 0.1) !important;
    }

    html:not(.dark) .text-slate-200 {
      color: #0f172a !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-300 {
      color: #1e293b !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-400 {
      color: #334155 !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-500 {
      color: #475569 !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-600 {
      color: #475569 !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-700 {
      color: #64748b !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-slate-800 {
      color: #94a3b8 !important;
      /* Más oscuro */
    }

    html:not(.dark) .text-white {
      color: #000000 !important;
      /* Negro puro para máximo contraste */
    }

    html:not(.dark) .hover\:bg-white\/5:hover {
      background-color: rgba(0, 0, 0, 0.05) !important;
    }

    html:not(.dark) .hover\:bg-slate-900\/40:hover {
      background-color: rgba(0, 0, 0, 0.05) !important;
    }

    html:not(.dark) .bg-white\/5 {
      background-color: rgba(0, 0, 0, 0.03) !important;
    }

    /* Resaltado Sala de Música en Modo Claro */
    html:not(.dark) .bg-slate-950.text-slate-500.border-slate-800 {
      background-color: #0369a1 !important;
      /* Azul más fuerte */
      color: #ffffff !important;
      /* Texto blanco para contraste */
      border-color: #0284c7 !important;
      font-weight: 800 !important;
      opacity: 1 !important;
    }

    /* Resaltado Sala de Música en Modo Oscuro */
    .dark .bg-slate-950.text-slate-500.border-slate-800 {
      background-color: rgba(56, 189, 248, 0.2) !important;
      color: #38bdf8 !important;
      border-color: rgba(56, 189, 248, 0.5) !important;
      font-weight: 800 !important;
    }

    /* Ensure the logo container remains distinct */
    html:not(.dark) .bg-white.border-slate-200 {
      background-color: white !important;
      border-color: #e2e8f0 !important;
    }

    /* Input and Search adjustments */
    html:not(.dark) input {
      background-color: #f8fafc !important;
      color: #0f172a !important;
      border-color: #e2e8f0 !important;
    }

    html:not(.dark) input::placeholder {
      color: #94a3b8 !important;
    }

    /* Modal/Overlay adjustments */
    html:not(.dark) .bg-black\/80 {
      background-color: rgba(255, 255, 255, 0.8) !important;
    }

    html:not(.dark) .selection\:text-white::selection {
      color: white !important;
    }

    /* Custom Ambient Glows for Light Mode */
    html:not(.dark) body::before {
      background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
    }

    html:not(.dark) body::after {
      background: radial-gradient(circle, rgba(16, 185, 129, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
    }
  </style>
</head>

<body class="selection:bg-indigo-600 selection:text-white">

    <div id="loader" class="bg-[#020617]"

        SISTEMA OSWT</p>
      <p id="status-text"
        style="color: #475569; font-family: sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">
        Iniciando componentes...</p>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
